apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-validator
  namespace: doc-validator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: doc-validator
  template:
    metadata:
      labels:
        app: doc-validator
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
        - name: wait-for-milvus
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z milvus 19530; do echo waiting for milvus; sleep 2; done']
      containers:
        - name: doc-validator
          image: doc-validator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8501
          envFrom:
            - configMapRef:
                name: doc-validator-config
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: doc-validator-secret
                  key: OPENAI_API_KEY
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: app-logs
              mountPath: /app/logs
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8501
            initialDelaySeconds: 40
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 10
      volumes:
        - name: app-logs
          persistentVolumeClaim:
            claimName: app-logs
